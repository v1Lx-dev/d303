<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kim z dywizjonu jesteś?</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
            background-color: #2c3e50;
            color: #ecf0f1;
        }
        button.glowny {
            padding: 20px 40px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 10px;
            box-shadow: 0 6px 10px rgba(0,0,0,0.3);
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 5vh;
        }
        button.glowny:hover:not(:disabled) {
            background-color: #c0392b;
        }
        button.glowny:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 3px 5px rgba(0,0,0,0.3);
        }
        button.glowny:disabled {
            background-color: #7f8c8d;
            cursor: not-allowed;
            box-shadow: none;
        }
        
        /* Styl dla mniejszego przycisku katalogu */
        button.katalog-btn {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.2s;
        }
        button.katalog-btn:hover {
            background-color: #2980b9;
        }

        #wynik {
            margin-top: 40px;
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            min-height: 45px;
            padding: 0 20px;
            color: #f1c40f;
            transition: color 0.3s ease;
        }
        .odliczanie {
            color: #ecf0f1 !important;
            font-size: 40px !important;
        }

        /* Sekcja katalogu */
        #katalog-kontener {
            display: none; /* Domyślnie ukryty */
            width: 100%;
            max-width: 600px;
            margin-top: 30px;
            background-color: #34495e;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        #katalog-statystyki {
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 15px;
            color: #bdc3c7;
        }
        .postac {
            padding: 10px;
            border-bottom: 1px solid #7f8c8d;
            font-size: 16px;
        }
        .postac:last-child {
            border-bottom: none;
        }
        .odblokowana {
            color: #f1c40f; /* Złoty dla zdobytych */
            font-weight: bold;
        }
        .zablokowana {
            color: #7f8c8d; /* Szary dla niezdobytych */
            font-style: italic;
        }
    </style>
</head>
<body>

    <button id="przycisk" class="glowny" onclick="losuj()">Jakim mieszkańcem osiedla Dywizjonu 303 jesteś dziś?</button>
    <div id="wynik"></div>
    
    <button class="katalog-btn" onclick="pokazUkryjKatalog()">📖 Pokaż katalog postaci</button>

    <div id="katalog-kontener">
        <div id="katalog-statystyki"></div>
        <div id="katalog-lista"></div>
    </div>

    <script>
        const odpowiedzi = [
            "Klupa zdrajca ojczyzny",
            "Klupa nierób",
            "Bronek w lateksie",
            "Klupa ukrainiec",
            "Klupa bohater UPA",
            "Klupa wieczny student",
            "Bronek z jabłkami",
            "Bronek z pocztówką z Tomaszowa Lubelskiego",
            "Klupa instruktor jazdy",
            "Klupa pałujący strajkujących górników kopalni \"Wujek\"",
            "Klupa bolszewik",
            "Klupa głosuję na Adriana nanana na na!",
            "Klupa na zjeździe narkotykowym",
            "Klupa na kacu po nocy w klubie studio",
            "Losowa kurewka Klupy z klubu studio",
            "Julka z jamnikiem",
            "Jamnik na psychotropach",
            "Klupa zmęczony po jeżdżeniu eLką",
            "Klupa nieszczery",
            "Klupa wróg publiczny",
            "Klupa posikany",
            "Klupa przebodźcowany",
            "Klupa kłamca",
            "Klupa oszust",
            "Klupa upadliniec",
            "Klupa sprzedawczyk",
            "Klupa konfident",
            "Klupa aktywista antify",
            "Klupa niebinarny",
            "Klupa eco-friendly",
            "Klupa Zielony Ład",
            "Klupa kolega pedofili",
            "Klupa zwolennik Mercosur",
            "Klupa przyklejony do asfaltu"
        ];

        // Pobieramy odblokowane postaci z pamięci (jeśli jeszcze nie ma, tworzymy pustą listę)
        let odblokowanePostaci = JSON.parse(localStorage.getItem('odblokowanePostaci')) || [];

        function czekaj(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function pobierzDzisiejszaDate() {
            return new Date().toLocaleDateString('pl-PL');
        }

        window.onload = function() {
            const dzisiaj = pobierzDzisiejszaDate();
            const ostatniaData = localStorage.getItem('dataLosowania');
            const zapisanyWynik = localStorage.getItem('wynikLosowania');

            if (ostatniaData === dzisiaj && zapisanyWynik) {
                const przycisk = document.getElementById('przycisk');
                const wynik = document.getElementById('wynik');
                
                przycisk.disabled = true;
                przycisk.innerText = "Już dziś losowałeś! Wróć jutro.";
                wynik.innerText = zapisanyWynik;
            }
            
            // Odśwież widok katalogu w tle przy ładowaniu strony
            generujKatalog();
        };

        async function losuj() {
            const przycisk = document.getElementById('przycisk');
            const wynik = document.getElementById('wynik');
            
            przycisk.disabled = true;
            wynik.className = "odliczanie";
            
            wynik.innerText = "3...";
            await czekaj(800);
            
            wynik.innerText = "2...";
            await czekaj(800);
            
            wynik.innerText = "1...";
            await czekaj(800);
            
            const losowyIndeks = Math.floor(Math.random() * odpowiedzi.length);
            const wylosowanaOdp = odpowiedzi[losowyIndeks];
            
            wynik.className = "";
            wynik.innerText = wylosowanaOdp;
            
            // Zapisz blokadę dzienną
            localStorage.setItem('dataLosowania', pobierzDzisiejszaDate());
            localStorage.setItem('wynikLosowania', wylosowanaOdp);
            
            // Dodaj do katalogu, jeśli jeszcze tam nie ma
            if (!odblokowanePostaci.includes(wylosowanaOdp)) {
                odblokowanePostaci.push(wylosowanaOdp);
                // Zapisujemy zaktualizowaną listę w pamięci przeglądarki jako tekst JSON
                localStorage.setItem('odblokowanePostaci', JSON.stringify(odblokowanePostaci));
                // Aktualizujemy widok katalogu
                generujKatalog();
            }
            
            przycisk.innerText = "Już dziś losowałeś! Wróć jutro.";
        }

        // Funkcja rozwijająca/zwijająca katalog
        function pokazUkryjKatalog() {
            const kontener = document.getElementById('katalog-kontener');
            if (kontener.style.display === "none" || kontener.style.display === "") {
                kontener.style.display = "block";
            } else {
                kontener.style.display = "none";
            }
        }

        // Funkcja rysująca zawartość katalogu
        function generujKatalog() {
            const lista = document.getElementById('katalog-lista');
            const statystyki = document.getElementById('katalog-statystyki');
            
            // Wyczyść starą listę
            lista.innerHTML = "";
            
            // Pokaż postęp np. "Odblokowano: 5 / 33"
            statystyki.innerText = `Odblokowano: ${odblokowanePostaci.length} / ${odpowiedzi.length}`;

            // Wygeneruj każdą postać
            odpowiedzi.forEach((postac, indeks) => {
                const elementDiv = document.createElement('div');
                
                // Sprawdzamy, czy wylosowałeś już tę postać
                if (odblokowanePostaci.includes(postac)) {
                    elementDiv.className = "postac odblokowana";
                    elementDiv.innerText = `${indeks + 1}. ${postac}`;
                } else {
                    elementDiv.className = "postac zablokowana";
                    elementDiv.innerText = `${indeks + 1}. ??? (Zablokowana)`;
                }
                
                lista.appendChild(elementDiv);
            });
        }
    </script>

</body>
</html>
